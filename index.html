<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    body{font-family: 'Hind Siliguri', sans-serif; background:#f5f5f7; padding-bottom: 80px;}
    .slider { display: flex; transition: transform 0.5s ease-in-out; }
    .active-nav{color:#7c3aed;}
    .modal-hidden { display: none; }
  </style>
</head>
<body>
  
  <header class="flex justify-between items-center p-4 bg-white sticky top-0 z-10 shadow-sm">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold text-lg">FF</div>
      <h1 class="text-xl font-bold text-gray-900">FF <span class="text-purple-600">BAZAR</span></h1>
    </div>
    <div class="flex items-center gap-3">
      <button id="wallet-btn" class="bg-purple-600 text-white px-4 py-1.5 rounded-full text-sm font-semibold flex items-center gap-1">
        <i class="ri-wallet-line"></i> <span>0৳</span>
      </button>
      <img id="user-pic" src="" class="w-9 h-9 rounded-full cursor-pointer hidden">
    </div>
  </header>

  <div id="notice" class="bg-purple-700 m-3 p-4 rounded-xl relative text-white">
    <div class="flex justify-between items-start">
      <div><p class="font-bold text-lg mb-1">Notice:</p><p class="text-sm">১৮ বছরের নিচে কেউ অর্ডার করবেন না।</p></div>
      <button onclick="document.getElementById('notice').style.display='none'" class="text-2xl leading-none">×</button>
    </div>
  </div>

  <div class="mx-3 rounded-xl overflow-hidden relative h-40">
    <div id="slider" class="slider h-full">
      <a href="https://t.me/ffbazarm" target="_blank" class="w-full h-full flex-shrink-0"><img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/banner4.png" class="w-full h-full object-cover"></a>
      <img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/banner5.png" class="w-full h-full object-cover flex-shrink-0">
      <img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/banner6.png" class="w-full h-full object-cover flex-shrink-0">
    </div>
    <div id="dots" class="flex justify-center gap-1.5 absolute bottom-2 left-0 right-0"></div>
  </div>

  <div class="p-4">
    <h2 class="text-center text-2xl font-bold mb-4 text-gray-800">FREE FIRE</h2>
    <div class="grid grid-cols-3 gap-3">
      <a href="order.html?item=200like" class="text-center"><img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/like.png" class="rounded-xl w-full aspect-square object-cover shadow-md"><p class="text-sm font-bold mt-2 text-gray-800">Free Fire - 200 Like</p><p class="text-xs text-gray-500">প্রতিদিন</p></a>
      <a href="order.html?item=uid" class="text-center"><img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/uid.png" class="rounded-xl w-full aspect-square object-cover shadow-md"><p class="text-sm font-bold mt-2 text-gray-800">UID TOPUP (BD)</p></a>
      <a href="order.html?item=weekly" class="text-center"><img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/weekly.png" class="rounded-xl w-full aspect-square object-cover shadow-md"><p class="text-sm font-bold mt-2 text-gray-800">Weekly/Monthly Offer</p></a>
      <a href="order.html?item=weeklylite" class="text-center"><img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/wklite.png" class="rounded-xl w-full aspect-square object-cover shadow-md"><p class="text-sm font-bold mt-2 text-gray-800">Weekly Lite</p><p class="text-xs text-gray-500">(BD Server)</p></a>
      <a href="order.html?item=levelpass" class="text-center"><img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/evo.png" class="rounded-xl w-full aspect-square object-cover shadow-md"><p class="text-sm font-bold mt-2 text-gray-800">LEVEL UP PASS</p></a>
      <a href="order.html?item=indo" class="text-center"><img src="https://raw.githubusercontent.com/bdchunchumonikhisa-code/FF-Bazar-ofichial-code/main/images/indo.png" class="rounded-xl w-full aspect-square object-cover shadow-md"><p class="text-sm font-bold mt-2 text-gray-800">Indonesia</p><p class="text-xs text-gray-500">(UID)</p></a>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="login-modal" class="modal-hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-6 w-full max-w-sm shadow-2xl relative">
      <button id="close-modal" class="absolute top-3 right-3 text-gray-400 text-2xl">×</button>
      <h2 class="text-2xl font-bold mb-4">Login</h2>
      <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 border rounded-lg py-2.5 font-semibold hover:bg-gray-100">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
        Login with Google
      </button>
      <p class="text-center text-sm mt-4">New user? <a href="#" class="text-purple-700 font-bold">Register Now</a></p>
    </div>
  </div>

  <footer class="bg-[#0a1435] text-white px-6 py-8 mt-8">
    <div class="text-center text-sm text-gray-400 border-t border-white/10 pt-4"><p>© FF BAZAR 2026</p></div>
  </footer>

  <nav class="fixed bottom-0 left-0 right-0 bg-white flex justify-around py-2 border-t border-gray-200 z-20">
    <a href="index.html" class="flex flex-col items-center active-nav text-xs gap-0.5"><i class="ri-home-5-fill text-2xl"></i><span class="font-semibold">Home</span></a>
    <a href="#" class="flex flex-col items-center text-gray-500 text-xs gap-0.5"><i class="ri-wallet-line text-2xl"></i><span>Add Money</span></a>
    <a href="orders.html" class="flex flex-col items-center text-gray-500 text-xs gap-0.5"><i class="ri-file-list-2-line text-2xl"></i><span>My Orders</span></a>
    <a href="#" class="flex flex-col items-center text-gray-500 text-xs gap-0.5"><i class="ri-user-line text-2xl"></i><span>My Account</span></a>
  </nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // ==== এখানে তোমার Firebase Config বসাও ====
  const firebaseConfig = {
    apiKey: "AIzaSyB_XXXXX", // <-- তোমারটা বসাও
    authDomain: "ff-bazar-xxxxx.firebaseapp.com",
    projectId: "ff-bazar-xxxxx",
    storageBucket: "ff-bazar-xxxxx.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:xxxxx"
  };
  // ==========================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const walletBtn = document.getElementById('wallet-btn');
  const loginModal = document.getElementById('login-modal');
  const closeModal = document.getElementById('close-modal');
  const googleLoginBtn = document.getElementById('google-login-btn');
  const userPic = document.getElementById('user-pic');

  walletBtn.addEventListener('click', () => {
    if(!auth.currentUser){ loginModal.classList.remove('modal-hidden'); }
  });
  closeModal.addEventListener('click', () => loginModal.classList.add('modal-hidden'));

  // এটাই Click করলে তোমার Screenshot এর মতো "Choose an account" আসবে
  googleLoginBtn.addEventListener('click', () => {
    signInWithPopup(auth, provider)
      .then(() => loginModal.classList.add('modal-hidden'))
      .catch((error) => alert("Error: " + error.message));
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      userPic.src = user.photoURL;
      userPic.classList.remove('hidden');
      walletBtn.innerHTML = `<i class="ri-wallet-line"></i> 0৳`; 
      userPic.onclick = () => { if(confirm('Logout করবেন?')) signOut(auth); }
    } else {
      userPic.classList.add('hidden');
    }
  });

  const slider = document.getElementById('slider');
  const dotsContainer = document.getElementById('dots');
  const slides = slider.children.length;
  let currentSlide = 0;
  if(slides > 0){
    for(let i=0; i<slides; i++){ dotsContainer.innerHTML += `<div class="w-2 h-2 bg-white/30 rounded-full dot transition-all"></div>`; }
    const dots = document.querySelectorAll('.dot');
    function updateSlider(){ slider.style.transform = `translateX(-${currentSlide * 100}%)`; dots.forEach((dot, i) => { dot.classList.toggle('bg-white', i === currentSlide); dot.classList.toggle('w-4', i === currentSlide); }); }
    setInterval(() => { currentSlide = (currentSlide + 1) % slides; updateSlider(); }, 3000); 
    updateSlider();
  }
</script>
</body>
</html>
