<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF ARENA — Free Fire Tournament Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0A0A0F;
    --glass: #12121A;
    --panel: #1A1A28;
    --border: #2A2A3E;
    --cyan: #00F5FF;
    --purple: #9B30FF;
    --pink: #FF3CAC;
    --gold: #FFD700;
    --green: #00FF88;
    --red: #FF4444;
    --text: #E8E8F0;
    --muted: #6A6A8A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--void);
    color: var(--text);
    overflow-x: hidden;
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--void); }
  ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px);
    pointer-events: none;
    z-index: 1000;
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,245,255,0.2);
    padding: 0 16px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
  }
  .nav-right { display: flex; gap: 10px; align-items: center; }
  .btn-vip {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem; font-weight: 700;
    padding: 7px 14px; border-radius: 6px;
    border: none; cursor: pointer; letter-spacing: 1px;
  }
  .nav-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.85rem; color: #000; cursor: pointer;
  }
  .wallet-nav-btn {
    background: rgba(0,255,136,0.12);
    border: 1px solid rgba(0,255,136,0.35);
    color: var(--green);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem; font-weight: 700;
    padding: 7px 12px; border-radius: 6px;
    border-left: none; cursor: pointer; letter-spacing: 1px;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
  }
  .wallet-nav-btn:hover { background: rgba(0,255,136,0.2); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
    background: rgba(10,10,15,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; height: 64px;
  }
  .bnav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; transition: all 0.2s;
    border: none; background: transparent; color: var(--muted);
    font-family: 'Rajdhani', sans-serif; font-size: 0.65rem;
    font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  }
  .bnav-item.active { color: var(--cyan); }
  .bnav-item .bnav-icon { font-size: 1.3rem; }

  /* PAGES */
  .page { display: none; padding-top: 68px; padding-bottom: 72px; min-height: 100vh; }
  .page.active { display: block; }

  /* HERO */
  .hero {
    position: relative; height: 320px; overflow: hidden;
    display: flex; align-items: center;
    background: radial-gradient(ellipse at 30% 50%, rgba(155,48,255,0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(0,245,255,0.15) 0%, transparent 60%), var(--void);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(0,245,255,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.06) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridPulse 4s ease-in-out infinite;
  }
  @keyframes gridPulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
  .hero-content { position: relative; z-index: 2; padding: 0 24px; }
  .hero-eyebrow { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 4px; color: var(--cyan); text-transform: uppercase; margin-bottom: 10px; }
  .hero-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; line-height: 1.1; margin-bottom: 12px; }
  .hero-title .accent { color: var(--cyan); text-shadow: 0 0 30px rgba(0,245,255,0.5); }
  .hero-title .accent2 { color: var(--pink); }
  .hero-sub { font-size: 1rem; color: var(--muted); margin-bottom: 20px; font-weight: 500; }
  .hero-btns { display: flex; gap: 10px; }
  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    color: #000; font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    padding: 11px 22px; border-radius: 8px;
    border: none; cursor: pointer; letter-spacing: 1px;
  }
  .btn-outline {
    background: transparent; color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    padding: 10px 22px; border-radius: 8px;
    border: 1px solid var(--cyan); cursor: pointer; letter-spacing: 1px;
  }

  /* TICKER */
  .live-ticker {
    background: var(--glass);
    border-top: 1px solid rgba(255,60,172,0.3);
    border-bottom: 1px solid rgba(255,60,172,0.3);
    padding: 9px 0; overflow: hidden;
  }
  .ticker-inner { display: flex; gap: 60px; animation: ticker 30s linear infinite; white-space: nowrap; }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-item { display: inline-flex; align-items: center; gap: 8px; font-size: 0.82rem; font-weight: 600; }
  .ticker-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pink); animation: blink 1s ease infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
  .ticker-label { color: var(--pink); font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 2px; margin-right: 16px; }

  /* SECTION */
  .section { padding: 28px 16px; max-width: 900px; margin: 0 auto; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title {
    font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display: block; width: 3px; height: 18px;
    background: linear-gradient(to bottom, var(--cyan), var(--purple)); border-radius: 2px;
  }

  /* TOURNAMENT CARDS */
  .tournament-grid { display: flex; flex-direction: column; gap: 14px; }
  .t-card {
    background: var(--glass); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.3s;
  }
  .t-card:hover { border-color: rgba(0,245,255,0.4); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,245,255,0.08); }
  .t-card-header {
    height: 80px; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .t-card-header.solo { background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(155,48,255,0.15)); }
  .t-card-header.duo { background: linear-gradient(135deg, rgba(255,60,172,0.2), rgba(155,48,255,0.15)); }
  .t-card-header.squad { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,60,172,0.15)); }
  .t-type-badge { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }
  .solo .t-type-badge { color: var(--cyan); text-shadow: 0 0 20px rgba(0,245,255,0.5); }
  .duo .t-type-badge { color: var(--pink); text-shadow: 0 0 20px rgba(255,60,172,0.5); }
  .squad .t-type-badge { color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.5); }
  .t-live-badge {
    position: absolute; top: 8px; right: 10px;
    background: rgba(255,68,68,0.2); border: 1px solid rgba(255,68,68,0.5);
    color: var(--red); font-size: 0.6rem; font-weight: 700;
    letter-spacing: 2px; padding: 3px 7px; border-radius: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .t-live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); animation: blink 1s infinite; }
  .t-card-body { padding: 14px; }
  .t-card-name { font-family: 'Orbitron', sans-serif; font-size: 0.78rem; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; }
  .t-card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 12px; }
  .t-stat { background: var(--panel); border-radius: 6px; padding: 8px 10px; }
  .t-stat-val { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--cyan); }
  .t-stat-lbl { font-size: 0.62rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .t-card-footer { display: flex; gap: 8px; align-items: center; }
  .btn-join {
    flex: 1; padding: 9px; border-radius: 7px;
    font-family: 'Orbitron', sans-serif; font-size: 0.68rem; font-weight: 700;
    letter-spacing: 1px; border: none; cursor: pointer; text-transform: uppercase;
  }
  .btn-join.paid { background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #000; }
  .btn-join.free { background: linear-gradient(135deg, var(--green), #00CC66); color: #000; }
  .timer-badge {
    background: rgba(155,48,255,0.15); border: 1px solid rgba(155,48,255,0.3);
    color: var(--purple); font-family: 'Orbitron', sans-serif;
    font-size: 0.62rem; font-weight: 700; padding: 6px 10px; border-radius: 6px;
  }

  /* ============ WALLET PAGE ============ */
  .wallet-header {
    background: linear-gradient(135deg, rgba(0,255,136,0.12), rgba(0,245,255,0.08));
    border-bottom: 1px solid rgba(0,255,136,0.2);
    padding: 28px 16px 20px;
  }
  .wallet-balance-card {
    max-width: 420px; margin: 0 auto;
    background: var(--glass);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .wallet-balance-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(0,255,136,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .wallet-label { font-size: 0.7rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .wallet-amount {
    font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 900;
    color: var(--green); text-shadow: 0 0 30px rgba(0,255,136,0.35);
    margin-bottom: 4px;
  }
  .wallet-currency { font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; letter-spacing: 2px; }
  .wallet-actions { display: flex; gap: 10px; }
  .wallet-action-btn {
    flex: 1; padding: 11px; border-radius: 10px;
    font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 700;
    letter-spacing: 1px; border: none; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .wallet-action-btn.add { background: linear-gradient(135deg, var(--green), #00CC66); color: #000; }
  .wallet-action-btn.withdraw { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
  .wallet-action-btn:hover { transform: translateY(-1px); }

  /* TRANSACTION LIST */
  .tx-list { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    background: var(--glass); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .tx-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .tx-icon.credit { background: rgba(0,255,136,0.12); }
  .tx-icon.debit { background: rgba(255,68,68,0.12); }
  .tx-info { flex: 1; }
  .tx-title { font-weight: 600; font-size: 0.88rem; margin-bottom: 2px; }
  .tx-date { font-size: 0.68rem; color: var(--muted); }
  .tx-amount { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; }
  .tx-amount.credit { color: var(--green); }
  .tx-amount.debit { color: var(--red); }

  /* ============ ADD MONEY MODAL ============ */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 900;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px;
    padding: 20px 20px 30px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
    letter-spacing: 2px; text-align: center; margin-bottom: 20px;
    color: var(--cyan);
  }

  /* AMOUNT INPUT */
  .amount-input-wrap { margin-bottom: 20px; position: relative; }
  .amount-input-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .amount-input {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px 14px 40px;
    font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700;
    color: var(--text); outline: none;
    transition: border-color 0.2s;
  }
  .amount-input:focus { border-color: var(--cyan); }
  .amount-currency-sym {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--cyan);
    margin-top: 10px;
  }
  .amount-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .preset-btn {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 6px 14px;
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .preset-btn:hover, .preset-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,245,255,0.08); }

  /* PAYMENT METHODS */
  .pay-methods-title { font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .pay-methods { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .pay-method-card {
    background: var(--panel); border: 2px solid var(--border);
    border-radius: 14px; padding: 16px 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all 0.25s;
    position: relative;
  }
  .pay-method-card:hover { border-color: rgba(0,245,255,0.35); }
  .pay-method-card.selected { border-color: var(--cyan); background: rgba(0,245,255,0.05); }
  .pay-logo-wrap {
    width: 56px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
    background: #fff;
    padding: 4px 6px;
  }
  .pay-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }

  /* bKash fallback logo */
  .bkash-logo-fallback {
    background: #E2136E;
    color: #fff; font-weight: 900; font-size: 0.65rem;
    width: 56px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0.5px; flex-shrink: 0;
    font-family: Arial, sans-serif;
  }
  /* Nagad fallback */
  .nagad-logo-fallback {
    background: linear-gradient(135deg, #F05A28, #FF8C00);
    color: #fff; font-weight: 900; font-size: 0.65rem;
    width: 56px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0.5px; flex-shrink: 0;
    font-family: Arial, sans-serif;
  }

  .pay-method-info { flex: 1; }
  .pay-method-name { font-weight: 700; font-size: 0.92rem; margin-bottom: 2px; }
  .pay-method-number { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; }
  .pay-method-badge {
    font-size: 0.58rem; font-weight: 700;
    padding: 3px 7px; border-radius: 4px; letter-spacing: 1px;
    font-family: 'Orbitron', sans-serif;
  }
  .pay-method-badge.instant { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .pay-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .pay-method-card.selected .pay-check { background: var(--cyan); border-color: var(--cyan); }
  .pay-check-inner { color: #000; font-size: 0.7rem; font-weight: 700; display: none; }
  .pay-method-card.selected .pay-check-inner { display: block; }

  /* INSTRUCTIONS */
  .pay-instructions {
    background: rgba(0,245,255,0.05);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 12px; padding: 14px 16px;
    margin-bottom: 20px; display: none;
  }
  .pay-instructions.visible { display: block; }
  .pay-instructions-title { font-size: 0.7rem; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
  .pay-step {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 8px; font-size: 0.82rem;
  }
  .pay-step:last-child { margin-bottom: 0; }
  .pay-step-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,245,255,0.15); border: 1px solid rgba(0,245,255,0.3);
    color: var(--cyan); font-size: 0.6rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-family: 'Orbitron', sans-serif;
  }
  .pay-number-highlight {
    font-family: 'Orbitron', sans-serif; color: var(--gold);
    font-weight: 700; letter-spacing: 1px;
  }

  /* TRX ID INPUT */
  .trx-input-wrap { margin-bottom: 20px; }
  .trx-input {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 16px;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600;
    color: var(--text); outline: none; transition: border-color 0.2s;
  }
  .trx-input:focus { border-color: var(--cyan); }
  .trx-input::placeholder { color: var(--muted); }

  .btn-confirm-pay {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--green), #00CC66);
    color: #000; font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    border: none; border-radius: 12px; cursor: pointer;
    letter-spacing: 1.5px; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,255,136,0.25);
  }
  .btn-confirm-pay:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(0,255,136,0.4); }
  .btn-confirm-pay:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); width: 30px; height: 30px;
    border-radius: 8px; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content:
