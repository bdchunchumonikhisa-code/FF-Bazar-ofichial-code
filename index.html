<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY TOPUP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <style>body{font-family: 'Hind Siliguri', sans-serif; background:#0f0f1a;}</style>
</head>
<body class="text-white pb-20">

  <!-- Header -->
  <header class="flex justify-between items-center p-4 bg-[#0f0f1a] sticky top-0 z-10">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center">⚡</div>
      <h1 class="text-xl font-bold">MY <span class="text-purple-500">TOPUP</span></h1>
    </div>
    <div class="flex items-center gap-3">
      <button class="bg-purple-600 px-3 py-1 rounded-full text-sm flex items-center gap-1">
        <i class="ri-wallet-3-line"></i> 0৳
      </button>
      <img src="https://i.pravatar.cc/40" class="w-9 h-9 rounded-full">
    </div>
  </header>

  <!-- Notice Banner -->
  <div class="bg-purple-700 m-3 p-3 rounded-lg relative">
    <div class="flex justify-between">
      <p class="font-bold text-lg">Notice:</p>
      <button onclick="this.parentElement.parentElement.style.display='none'">✕</button>
    </div>
    <p class="text-sm mt-1">১৮ বছরের নিচে কেউ অর্ডার করবেন না। ফ্যামিলির টাকা চুরি করে অর্ডার করলে আইনগত ব্যবস্থা নেওয়া হবে।</p>
  </div>

  <!-- Service Grid - 6 Cards -->
  <div class="p-4">
    <h2 class="text-center text-2xl font-bold mb-4">FREE FIRE</h2>
    <div class="grid grid-cols-3 gap-3">
      
      <!-- Card 1 -->
      <a href="order.html?item=200like" class="bg-[#1a1a2e] rounded-xl p-2 text-center hover:scale-95 active:bg-purple-900 transition">
        <img src="https://raw.githubusercontent.com/USERNAME/REPO/main/images/200like.jpg" class="rounded-lg w-full aspect-square object-cover mb-1" onerror="this.src='https://placehold.co/100x100/4c1d95/fff?text=200+Like'">
        <p class="text-xs">Free Fire - 200 Like</p>
      </a>

      <!-- Card 2 -->
      <a href="order.html?item=uid" class="bg-[#1a1a2e] rounded-xl p-2 text-center hover:scale-95 active:bg-purple-900 transition">
        <img src="https://raw.githubusercontent.com/USERNAME/REPO/main/images/uid.jpg" class="rounded-lg w-full aspect-square object-cover mb-1" onerror="this.src='https://placehold.co/100x100/4c1d95/fff?text=UID'">
        <p class="text-xs">UID TOPUP (BD)</p>
      </a>

      <!-- Card 3 -->
      <a href="order.html?item=weekly" class="bg-[#1a1a2e] rounded-xl p-2 text-center hover:scale-95 active:bg-purple-900 transition">
        <img src="https://raw.githubusercontent.com/USERNAME/REPO/main/images/weekly.jpg" class="rounded-lg w-full aspect-square object-cover mb-1" onerror="this.src='https://placehold.co/100x100/4c1d95/fff?text=Weekly'">
        <p class="text-xs">Weekly/Monthly Offer</p>
      </a>

      <!-- Card 4 -->
      <a href="order.html?item=weeklylite" class="bg-[#1a1a2e] rounded-xl p-2 text-center hover:scale-95 active:bg-purple-900 transition">
        <img src="https://raw.githubusercontent.com/USERNAME/REPO/main/images/weeklylite.jpg" class="rounded-lg w-full aspect-square object-cover mb-1" onerror="this.src='https://placehold.co/100x100/4c1d95/fff?text=Lite'">
        <p class="text-xs">Weekly Lite (BD)</p>
      </a>

      <!-- Card 5 -->
      <a href="order.html?item=levelpass" class="bg-[#1a1a2e] rounded-xl p-2 text-center hover:scale-95 active:bg-purple-900 transition">
        <img src="https://raw.githubusercontent.com/USERNAME/REPO/main/images/levelpass.jpg" class="rounded-lg w-full aspect-square object-cover mb-1" onerror="this.src='https://placehold.co/100x100/4c1d95/fff?text=Level+Pass'">
        <p class="text-xs">LEVEL UP PASS</p>
      </a>

      <!-- Card 6 -->
      <a href="order.html?item=indo" class="bg-[#1a1a2e] rounded-xl p-2 text-center hover:scale-95 active:bg-purple-900 transition">
        <img src="https://raw.githubusercontent.com/USERNAME/REPO/main/images/indo.jpg" class="rounded-lg w-full aspect-square object-cover mb-1" onerror="this.src='https://placehold.co/100x100/4c1d95/fff?text=Indo'">
        <p class="text-xs">Indonesia Server</p>
      </a>
    </div>
  </div>

  <!-- Floating Help Button -->
  <button class="fixed bottom-24 right-4 bg-red-600 text-white px-4 py-2 rounded-full flex items-center gap-1 shadow-lg">
    <i class="ri-phone-fill"></i> সাহায্য
  </button>

  <!-- Bottom Navbar -->
  <nav class="fixed bottom-0 left-0 right-0 bg-[#1a1a2e] flex justify-around py-2 border-t border-gray-800">
    <a href="#" class="flex flex-col items-center text-purple-500 text-xs"><i class="ri-home-5-line text-xl"></i>Home</a>
    <a href="#" class="flex flex-col items-center text-gray-400 text-xs"><i class="ri-wallet-line text-xl"></i>Add Money</a>
    <a href="#" class="flex flex-col items-center text-gray-400 text-xs"><i class="ri-file-list-3-line text-xl"></i>My Orders</a>
    <a href="#" class="flex flex-col items-center text-gray-400 text-xs"><i class="ri-apps-2-line text-xl"></i>My Codes</a>
    <a href="#" class="flex flex-col items-center text-gray-400 text-xs"><i class="ri-user-line text-xl"></i>Account</a>
  </nav>

</body>
</html>
