<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-md mx-auto mt-10 bg-white rounded-xl shadow p-6 text-center">

<img id="photo" class="w-24 h-24 rounded-full mx-auto">

<h2 id="name" class="text-xl font-bold mt-4"></h2>

<p id="email" class="text-gray-500"></p>

<button onclick="logout()" class="mt-6 w-full bg-red-600 text-white py-3 rounded-lg">
Logout
</button>

</div>

<script>
document.getElementById("photo").src=localStorage.getItem("userPhoto");
document.getElementById("name").innerText=localStorage.getItem("userName");
document.getElementById("email").innerText=localStorage.getItem("userEmail");

function logout(){
localStorage.clear();
location.href="index.html";
}
</script>

</body>
  </html>
