<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FF BAZAR</title>

<link rel="stylesheet" href="style.css">

<style>
.login-box{
width:90%;
max-width:400px;
margin:80px auto;
background:#1f2937;
padding:25px;
border-radius:15px;
text-align:center;
}

.login-box img{
width:90px;
margin-bottom:15px;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

.login-box button{
width:100%;
padding:12px;
background:#00ff99;
color:#000;
font-weight:bold;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.login-box p{
margin-top:15px;
color:#ccc;
}

.login-box a{
color:#00ff99;
text-decoration:none;
}
</style>

</head>

<body>

<div class="login-box">

<img src="images/logo.png">

<h2>FF BAZAR LOGIN</h2>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p>Support :
<b>@Chunchumoni</b>
</p>

</div>

<script>
function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==""||p==""){

alert("Please enter Username & Password");

}else{

localStorage.setItem("login","true");

window.location="home.html";

}

}
</script>

</body>
</html>
