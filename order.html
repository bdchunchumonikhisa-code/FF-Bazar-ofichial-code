<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - FF BAZAR</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
body{font-family: 'Hind Siliguri', sans-serif; background:#f0f4f9;}
.package-btn,.payment-btn { border: 2px solid #e5e7eb; transition: all.2s; background: white;}
.package-btn.active,.payment-btn.active { border-color: #9333ea; background: #faf5ff; }
.corner-ribbon { display: none; position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 40px 40px 0; border-color: transparent #dc2626 transparent; }
.payment-btn.active.corner-ribbon { display: block; }
.corner-ribbon i { position: absolute; top: 3px; right: 3px; color: white; font-size: 14px; }
.checkout-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f4f9; z-index: 50; overflow-y: auto;}
.package-btn{display: flex; justify-content: space-between; align-items: center; text-align: left; padding: 12px;}
.package-btn::before{content: ''; width: 20px; height: 20px; border: 2px solid #d1d5db; border-radius: 50%; flex-shrink: 0; margin-right: 10px;}
.package-btn.active::before{border-color: #9333ea; background: radial-gradient(circle, #9333ea 40%, white 41%);}
</style>
</head>
<body class="pb-20">
<div id="order-page">
<header class="flex items-center gap-3 p-4 bg-white sticky top-0 z-10 shadow-sm">
<a href="index.html"><i class="ri-arrow-left-line text-2xl"></i></a>
<h1 class="text-lg font-bold" id="page-title">Order</h1>
</header>
<div class="p-4 space-y-4">
<div class="bg-white p-4 rounded-xl shadow-sm">
<div class="flex items-center gap-2 mb-3"><div class="w-6 h-6 bg-purple-600 text-white rounded-full flex items-center justify-center text-sm font-bold">1</div><p class="font-bold text-lg">Select Recharge</p></div>
<div id="package-list" class="grid grid-cols-2 gap-3"></div>
</div>
<div class="bg-white p-4 rounded-xl shadow-sm">
<div class="flex items-center gap-2 mb-3"><div class="w-6 h-6 bg-purple-600 text-white rounded-full flex items-center justify-center text-sm font-bold">2</div><p class="font-bold text-lg">Account Info</p></div>
<label class="text-sm text-gray-600">Player id</label>
<input type="number" id="uid-input" placeholder="Player id" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
<button class="w-full mt-3 bg-purple-600 text-white font-semibold py-2.5 rounded-lg">আপনার গেম আইডির নাম চেক করুন</button>
</div>
<div class="bg-white p-4 rounded-xl shadow-sm">
<div class="flex items-center gap-2 mb-3"><div class="w-6 h-6 bg-purple-600 text-white rounded-full flex items-center justify-center text-sm font-bold">3</div><p class="font-bold text-lg">Select one option</p></div>
<div class="grid grid-cols-2 gap-3">
<button class="payment-btn relative rounded-lg overflow-hidden text-left bg-white" onclick="selectPayment(0)"><div class="p-3 flex items-center justify-center h-24"><img src="./images/wallet.png" class="h-14 object-contain"></div><div class="bg-gray-200 p-2 text-sm font-semibold text-gray-700">Wallet Pay</div><div class="corner-ribbon"><i class="ri-check-line"></i></div></button>
<button class="payment-btn relative rounded-lg overflow-hidden text-left bg-white active" onclick="selectPayment(1)"><div class="p-2 flex-col items-center justify-center h-24"><img src="./images/Payment-logos.jpg" class="h-16 object-contain"><p class="text-blue-600 font-bold text-xs mt-1">Auto Payment</p></div><div class="bg-gray-200 p-2 text-center text-sm font-semibold text-gray-700">Instant Pay</div><div class="corner-ribbon"><i class="ri-check-line"></i></div></button>
</div>
<div class="mt-3 space-y-2 text-sm text-gray-600">
<p class="flex items-center gap-2"><i class="ri-information-line"></i> আপনার অ্যাকাউন্ট ব্যালেন্স <span class="font-bold text-purple-600">৳ 2.00</span></p>
<p class="flex items-center gap-2"><i class="ri-information-line"></i> প্রোডাক্ট কিনতে আপনার প্রয়োজন <span id="need-amount" class="font-bold text-purple-600">৳ 0</span></p>
</div>
<button id="order-btn" onclick="showCheckout()" class="w-full mt-3 bg-purple-600 text-white font-bold py-3 rounded-lg disabled:bg-gray-300" disabled>Buy Now - <span id="total-price">0৳</span></button>
</div>
</div>
</div>
<!-- Secure Checkout Page -->
<div id="checkout-page" class="checkout-page">
<header class="flex items-center justify-between p-3 bg-gray-900 text-white">
<button onclick="hideCheckout()"><i class="ri-close-line text-2xl"></i></button>
<div class="text-center"><p class="font-semibold">Secure Checkout -...</p><p class="text-xs text-gray-300">pay.offertopup.com</p></div>
<div class="flex items-center gap-3"><i class="ri-share-line text-xl"></i><i class="ri-bookmark-line text-xl"></i><i class="ri-more-2-fill text-xl"></i></div>
</header>
<div class="p-4">
<div class="bg-white rounded-xl p-6 text-center">
<div class="w-32 h-16 border rounded-full flex items-center justify-center mx-auto gap-2 mb-3 bg-gray-50">
<img src="./images/nogod.png" class="h-8 object-contain">
<img src="./images/bkash.png" class="h-6 object-contain">
</div>
<p class="text-gray-500 text-2xl font-bold">Wallet</p>
<button class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg mt-4">Mobile Banking</button>
<div class="grid grid-cols-2 gap-3 mt-3">
<button onclick="showPaymentForm('bKash')" class="border rounded-lg p-2 flex items-center justify-center h-14 active:scale-95 bg-white">
<img src="./images/bkash.png" class="h-10 object-contain">
</button>
<button onclick="showPaymentForm('Nagad')" class="border rounded-lg p-2 flex items-center justify-center h-14 active:scale-95 bg-white">
<img src="./images/nogod.png" class="h-10 object-contain">
</button>
</div>
</div>
<div id="payment-form-box" class="hidden mt-4"></div>
</div>
<div class="fixed bottom-0 left-0 right-0 bg-blue-100 p-3 text-center">
<p class="text-blue-700 font-bold text-lg">Pay <span id="pay-amount">0.00</span></p>
</div>
</div>
<!-- 👇 Success Popup Updated 👇 -->
<div id="success-modal" class="fixed inset-0 bg-black/50 z-60 hidden items-center justify-center p-4">
<div class="bg-white rounded-xl p-6 text-center max-w-sm w-full">
<i class="ri-checkbox-circle-line text-6xl text-green-500"></i>
<h2 class="text-xl font-bold mt-2">Success!</h2>
<p class="text-gray-600 mt-2">Order Complete!</p>
<p class="text-sm text-purple-600 font-semibold mt-1">3-4 Second এ Diamond পেয়ে যাবেন</p>
<button onclick="window.location.href='index.html'" class="w-full mt-4 bg-purple-600 text-white font-bold py-2.5 rounded-lg">ঠিক আছে</button>
</div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const item = params.get('item');
const packages = {
'200like': [ {name: 'প্রতিদিন 200 Likes (Instant Delivery)', price: 35} ],
'indo': [ {name: '50 Diamond (Indo)', price: 65}, {name: '70 Diamond (Indo)', price: 90}, {name: '100 Diamond (Indo)', price: 130}, {name: '140 Diamond (Indo)', price: 180}, {name: '355 Diamond (Indo)', price: 445}, {name: '720 Diamond (Indo)', price: 890}, {name: '7290 Diamond (Indo)', price: 8800}, {name: 'Weekly (Indo)', price: 255} ],
'weeklylite': [ {name: '1X Weekly Lite', price: 45}, {name: '2X Weekly Lite', price: 90}, {name: '3X Weekly Lite', price: 135}, {name: '4X Weekly Lite', price: 180}, {name: '5X Weekly Lite', price: 225} ],
'weekly': [ {name: '1X Weekly', price: 158}, {name: '2X Weekly', price: 316}, {name: '3X Weekly', price: 474}, {name: '4X Weekly + 1X Monthly', price: 1422}, {name: '5X Weekly + 1X Monthly', price: 1580}, {name: '1X Monthly', price: 790}, {name: '2X Monthly', price: 1580}, {name: '3X Monthly', price: 2370}, {name: '5X Monthly + 22 Weekly', price: 7426}, {name: '1X Monthly + 1X Weekly', price: 948} ],
'uid': [ {name: 'Weekly', price: 158}, {name: 'Monthly', price: 790}, {name: '25 Diamond', price: 20}, {name: '50 Diamond', price: 35}, {name: '115 Diamond', price: 79}, {name: '240 Diamond', price: 158}, {name: '355 Diamond', price: 237}, {name: '610 Diamond', price: 400}, {name: '1240 Diamond', price: 800}, {name: '2090 Diamond', price: 1358}, {name: '2530 Diamond', price: 1610}, {name: '5060 Diamond', price: 3220}, {name: '10120 Diamond', price: 6440} ],
'levelpass': [ {name: 'Level Up Package - Level 6', price: 43}, {name: 'Level Up Package - Level 10', price: 75}, {name: 'Level Up Package - Level 15', price: 75}, {name: 'Level Up Package - Level 20', price: 75}, {name: 'Level Up Package - Level 25', price: 75}, {name: 'Level Up Package - Level 30', price: 105}, {name: 'Full Level Up (1270 Diamond)', price: 450} ],
'unipin': [ {name: '25 Diamond Code', price: 20}, {name: '50 Diamond Code', price: 35}, {name: '115 Diamond Code', price: 79}, {name: '240 Diamond Code', price: 158}, {name: '610 Diamond Code', price: 400}, {name: '1240 Diamond Code', price: 800}, {name: '2530 Diamond Code', price: 1610}, {name: 'Weekly Code', price: 158}, {name: 'Monthly Code', price: 790} ],
'special': [ {name: 'Special Weekly', price: 15}, {name: 'Special Monthly', price: 150} ]
};

const titles = {
'200like': 'Free Fire - 200 Like',
'indo': 'Indonesia Server',
'weeklylite': 'Weekly Lite (ID Code)',
'weekly': 'Weekly & Monthly [Offer]',
'uid': 'Free Fire ID Code (BD)',
'levelpass': 'New Level Up Pass',
'unipin': 'UNIPIN Voucher (BDT)',
'special': '🔥 SPECIAL OFFER'
};

document.getElementById('page-title').innerText = titles[item] || 'Order';
const packageList = document.getElementById('package-list');
const currentPackages = packages[item] || [];
let selectedPrice = 0;
let currentPaymentMethod = 'bKash';
const paymentDetails = {
'bKash': { number: '01873786543', code: '*247#', color: 'bg-pink-600' },
'Nagad': { number: '01873786543', code: '*167#', color: 'bg-red-600' }
};
if(currentPackages.length > 0){
currentPackages.forEach((pkg, index) => {
packageList.innerHTML += `<button class="package-btn rounded-lg" onclick="selectPackage(${index})"><span class="font-semibold text-sm">${pkg.name}</span><span class="text-orange-500 font-bold text-sm">${pkg.price} TK</span></button>`;
});
} else {
packageList.innerHTML = `<p class="text-center text-red-500 col-span-2">Error: Package পাওয়া যায়নি।</p>`;
}
function selectPackage(index) {
document.querySelectorAll('.package-btn').forEach(btn => btn.classList.remove('active'));
document.querySelectorAll('.package-btn')[index].classList.add('active');
selectedPrice = currentPackages[index].price;
document.getElementById('total-price').innerText = selectedPrice + '৳';
document.getElementById('need-amount').innerText = '৳ ' + selectedPrice;
document.getElementById('order-btn').disabled = false;
}
function selectPayment(index) {
document.querySelectorAll('.payment-btn').forEach(btn => btn.classList.remove('active'));
document.querySelectorAll('.payment-btn')[index].classList.add('active');
}
function showCheckout() {
document.getElementById('pay-amount').innerText = selectedPrice + '.00';
document.getElementById('checkout-page').style.display = 'block';
document.getElementById('order-page').style.display = 'none';
}
function hideCheckout() {
document.getElementById('checkout-page').style.display = 'none';
document.getElementById('order-page').style.display = 'block';
}
function showPaymentForm(method) {
currentPaymentMethod = method;
const details = paymentDetails[method];
const box = document.getElementById('payment-form-box');
box.classList.remove('hidden');
box.innerHTML = `
<div class="${details.color} rounded-xl p-5 text-white">
<p class="text-center font-bold text-3xl mb-4">ট্রানজেকশন আইডি দিন</p>
<input type="text" id="txid-input" placeholder="Zbznsnaa48" class="w-full p-3 rounded-lg text-gray-900 mb-4 outline-none text-base">
<div class="space-y-2 text-sm text-left">
<p>• <span class="font-bold">${details.code}</span> ডায়াল করে আপনার ${method} মোবাইল মেনুতে যান অথবা ${method} অ্যাপে যান।</p>
<p>• <span class="text-yellow-300 font-bold">"Send Money"</span> -এ ক্লিক করুন।</p>
<p>• প্রাপক নম্বর হিসেবে এই নম্বরটি লিখুন: <span class="font-bold text-yellow-300">${details.number}</span> <button onclick="copyNumber()" class="bg-white/20 px-2 py-0.5 rounded text-xs ml-1"><i class="ri-file-copy-line"></i> Copy</button></p>
<p>• টাকার পরিমাণঃ <span class="font-bold text-yellow-300">${selectedPrice}</span></p>
<p>• নিশ্চিত করতে এখন আপনার ${method} মোবাইল মেনু পিন লিখুন।</p>
<p>• সবকিছু ঠিক থাকলে, আপনি ${method} থেকে একটি নিশ্চিতকরণ বার্তা পাবেন।</p>
<p>• এখন উপরের বক্সে আপনার <span class="text-yellow-300 font-bold">Transaction ID</span> দিন।</p>
</div>
<button id="verify-btn" onclick="verifyOrder()" class="w-full font-bold py-4 rounded-xl text-2xl text-white bg-red-900 mt-5">VERIFY</button>
</div>`;
document.getElementById('txid-input').addEventListener('input', function() {
if(this.value.length >= 8){
verifyOrder();
}
});
}
function copyNumber() {
const number = paymentDetails[currentPaymentMethod].number;
navigator.clipboard.writeText(number);
alert('Number Copied: ' + number);
}
let isVerifying = false;
function verifyOrder() {
if(isVerifying) return;
const txid = document.getElementById('txid-input').value;
if(txid.length < 8){
alert('সঠিক Transaction ID দিন!');
return;
}
isVerifying = true;
const btn = document.getElementById('verify-btn');
btn.innerText = 'Verifying...';
btn.disabled = true;
btn.classList.add('bg-gray-500');
setTimeout(() => {
document.getElementById('success-modal').style.display = 'flex';
}, 3400); // 3.4 Second Delay
}
selectPayment(1);
</script>
</body>
</html>
