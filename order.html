<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - BEST TOPUP</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
body { background: #f5f7fa; padding-bottom: 70px; }
.header { background: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; color: #0047ab; }
.header-right { display: flex; align-items: center; gap: 10px; }
.balance { background: #0047ab; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 14px; }
.container { padding: 15px 10px; }
.product-header { background: #fff; padding: 15px; border-radius: 10px; display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
.product-header img { width: 80px; height: 80px; border-radius: 10px; }
.section { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
.section h3 { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; font-size: 16px; }
.badge { background: #0047ab; color: #fff; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.package-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.package { border: 1px solid #ddd; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; }
.package.active { border-color: #0047ab; background: #e6f0ff; }
.input-field { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
.btn-blue { width: 100%; background: #0047ab; color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
.back-btn { background: #666; color: #fff; padding: 8px 15px; border: none; border-radius: 6px; margin-bottom: 10px; cursor: pointer; }
.payment-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.pay-option { border: 2px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; }
.pay-option.active { border-color: #0047ab; }
.rules { background: #fff; padding: 15px; border-radius: 10px; }
.rules li { margin-bottom: 8px; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
<div class="logo"><img src="images/wallet.png" style="height:35px;"> BEST TOPUP</div>
<div class="header-right"><div class="balance">💼 0৳</div></div>
</div>
<div class="container">
<button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
<div class="product-header">
<img id="prodImg" src="" alt="">
<div><h2 id="prodName"></h2><p>Game / Top up</p></div>
</div>
<div class="section">
<h3><span class="badge">1</span> Select Recharge</h3>
<div class="package-grid" id="packageList"></div>
</div>
<div class="section">
<h3><span class="badge">2</span> Account Info</h3>
<input type="text" id="gameId" class="input-field" placeholder="এখানে গেমের আইডি কোড দিন">
</div>
<div class="section">
<h3><span class="badge">3</span> Select one option</h3>
<div class="payment-grid">
<div class="pay-option active" onclick="selectPay(this)"><b>Wallet Pay</b></div>
<div class="pay-option" onclick="selectPay(this)"><b>Instant Pay</b></div>
</div>
<div>ℹ️ প্রোডাক্ট কিনতে আপনার প্রয়োজন ৳<span id="needAmount">0</span></div>
<button class="btn-blue" onclick="goPayment()">Buy Now</button>
</div>
<div class="rules"><h3>📋 Rules & Conditions</h3><ul id="rulesList"></ul></div>
</div>

<script>
// SOB PACKAGE ER DATA
const uidData = [ {name: 'WEEKLY', price: 'BDT 158'}, {name: 'MONTHLY', price: 'BDT 790'}, {name: '25 Diamond', price: 'BDT 22'} ];
const lessData = [ {name: '1X LESS IS MORE', price: 'BDT 200'}, {name: '2X LESS IS MORE', price: 'BDT 420'} ];
const weeklyData = [ {name: 'WEEKLY', price: 'BDT 158'}, {name: 'MONTHLY', price: 'BDT 790'} ];
const liteData = [ {name: '1X Weekly Lite', price: 'BDT 42'} ];
const evoData = [ {name: '7 Days Evo Access', price: 'BDT 115'} ];
const likesData = [ {name: '200 FF LIKE', price: 'BDT 35'} ];
const levelData = [ {name: 'Level Up Package - Level 6', price: 'BDT 40'} ];
const indoData = [ {name: 'Monthly (Indo)', price: 'BDT 820'}, {name: '100 Diamond (Indo)', price: 'BDT 130'} ];

const indoRules = ["এখানে ইন্দোনেশিয়ান সার্ভারে টপ আপ করতে পারবেন", "Player ID Code ভুল দিয়ে Diamond না পেলে FFBazar কর্তৃপক্ষ দায়ী নয়"];
const bdRules = ["এখানে বাংলাদেশ সার্ভারে টপ আপ করতে পারবেন", "Player ID Code ভুল দিয়ে Diamond না পেলে FFBazar কর্তৃপক্ষ দায়ী নয়"];

let selectedAmount = 0; let selectedPay = "Wallet";

window.onload = function(){
let name = localStorage.getItem('prodName');
let img = localStorage.getItem('prodImg');
let dataName = localStorage.getItem('dataName');
document.getElementById('prodName').innerText = name;
document.getElementById('prodImg').src = img;

let data = window[dataName];
let packageHTML = '';
data.forEach(item => {
let price = parseInt(item.price.replace('BDT ',''));
packageHTML += `<div class="package" onclick="selectPackage(this, ${price})"><h4>${item.name}</h4><p>${item.price}</p></div>`;
});
document.getElementById('packageList').innerHTML = packageHTML;

let rules = (name === 'INDONESIA TOPUP')? indoRules : bdRules;
let rulesHTML = ''; rules.forEach(rule => {rulesHTML += `<li>${rule}</li>`; });
document.getElementById('rulesList').innerHTML = rulesHTML;
}

function selectPackage(el, price){
document.querySelectorAll('.package').forEach(p=>p.classList.remove('active'));
el.classList.add('active'); selectedAmount = price;
document.getElementById('needAmount').innerText = price;
}
function selectPay(element) {
document.querySelectorAll('.pay-option').forEach(el => el.classList.remove('active'));
element.classList.add('active');
selectedPay = element.innerText.includes("Instant")? "Instant" : "Wallet";
}
function goPayment(){
if(selectedAmount == 0){ alert("প্রথমে একটি প্যাকেজ সিলেক্ট করুন"); return; }
if(document.getElementById('gameId').value == ''){ alert("গেম আইডি দিন"); return; }
localStorage.setItem('amount', selectedAmount);
localStorage.setItem('gameId', document.getElementById('gameId').value);
window.location.href = 'payment.html';
}
</script>
</body>
</html>
